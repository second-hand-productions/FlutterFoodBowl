name: Deploy COD

on:
  push:
    branches: [main]
    paths:
      - 'cod/**'
      - '!cod/android/**'
      - 'deploy/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: cod
        run: flutter pub get

      - name: Build web
        working-directory: cod
        run: flutter build web --release --base-href /cod/

      - name: Deploy
        # Single privileged action, allowed via one NOPASSWD sudoers rule.
        # The script publishes the web build and installs/reloads the vhost.
        # See cod/deploy/README.md for the one-time server setup.
        run: sudo /usr/local/sbin/deploy-cod-nginx.sh "$PWD/cod/build/web" "$PWD/deploy/foodbowl.nginx.conf"
