name: Deploy CLA

on:
  push:
    branches: [main]
    paths:
      - 'cla/**'
      - '!cla/android/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: cla
        run: flutter pub get

      - name: Build web
        working-directory: cla
        run: flutter build web --release

      - name: Deploy
        run: |
          sudo mkdir -p /var/www/cla
          sudo rsync -a --delete cla/build/web/ /var/www/cla/

      - name: Install nginx config
        run: |
          sudo cp cla/deploy/cla.nginx.conf /etc/nginx/sites-available/cla
          sudo ln -sf /etc/nginx/sites-available/cla /etc/nginx/sites-enabled/cla
          # The unified cla vhost now owns the Tailscale server_name, so the
          # old single-purpose tailscale vhost must be disabled to avoid a
          # conflicting server_name on port 80.
          sudo rm -f /etc/nginx/sites-enabled/tailscale
          # Validate before reloading; a bad config aborts the step (set -e)
          # and leaves the running nginx untouched.
          sudo nginx -t
          sudo systemctl reload nginx
