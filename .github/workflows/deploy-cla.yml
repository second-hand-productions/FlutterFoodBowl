name: Deploy CLA

on:
  push:
    branches: [main]
    paths:
      - 'cla/**'
      - '!cla/android/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: cla
        run: flutter pub get

      - name: Build web
        working-directory: cla
        run: flutter build web --release

      - name: Deploy
        # Single privileged action, allowed via one NOPASSWD sudoers rule.
        # The script publishes the web build and installs/reloads the vhost.
        # See cla/deploy/README.md for the one-time server setup.
        run: sudo /usr/local/sbin/deploy-cla-nginx.sh "$PWD/cla/build/web" "$PWD/cla/deploy/cla.nginx.conf"
