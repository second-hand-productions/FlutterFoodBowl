# Managed by the FlutterFoodBowl deploy pipeline (.github/workflows/deploy-cla.yml).
# Edits made directly on the server will be overwritten on the next deploy.
#
# One vhost answers for both the LAN name (cla.lan) and the Tailscale MagicDNS
# name. The Flutter web app is served at / and talks to its backends through
# same-origin paths, so a single build works on the local subnet (plain http/ws)
# and remotely over Tailscale (https/wss, with TLS terminated by `tailscale serve`
# in front of nginx:80).
server {
    listen 80;
    listen [::]:80;
    server_name cla.lan ubuntuserver.tailb99a87.ts.net;

    root /var/www/cla;
    index index.html;

    # Flutter web app (single-page app fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PocketBase API on this host. The /pb/ prefix is stripped before proxying.
    location /pb/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # PocketBase realtime is server-sent events: keep-alive, no buffering.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # MQTT over WebSocket -> broker on the MQTT LXC (plain ws over the LAN).
    # The /mqtt prefix is stripped so the broker sees a root WS connection.
    location /mqtt {
        proxy_pass http://192.168.0.49:9001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
