# Managed by the FlutterFoodBowl deploy pipeline.
# Installed to /etc/nginx/apps.d/foodbowl.conf and included by the shared root
# vhost — this file is a FRAGMENT, not a full server block.
# Edits made directly on the server will be overwritten on the next deploy.
#
# The root vhost is infrastructure and is no longer rewritten by this pipeline.
# It owns `server_name`, the landing page, and the shared backends (/pb/,
# /mqtt); `root /var/www` is inherited from the enclosing server block.
#
#   /cla/ -> /var/www/cla
#   /cod/ -> /var/www/cod

location = /cla {
    return 308 /cla/;
}

location /cla/ {
    try_files $uri $uri/ /cla/index.html;
}

location = /cod {
    return 308 /cod/;
}

location /cod/ {
    try_files $uri $uri/ /cod/index.html;
}
