# Managed by the FlutterFoodBowl deploy pipeline.
# Edits made directly on the server will be overwritten on the next deploy.
#
# nginx owns the shared LAN/Tailscale root. Flutter apps are served by path:
#   /cla/ -> /var/www/cla
#   /cod/ -> /var/www/cod
#
# Backends stay shared at same-origin paths:
#   /pb/   -> PocketBase on the Ubuntu host
#   /mqtt  -> Mosquitto WebSockets on the MQTT LXC
server {
    listen 80;
    listen [::]:80;
    server_name cla.lan cod.lan ubuntuserver.tailb99a87.ts.net 100.95.188.96;

    root /var/www;
    index index.html;

    location = / {
        default_type text/html;
        return 200 '<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Food Bowl</title><style>body{font-family:system-ui,sans-serif;margin:2rem;line-height:1.5}a{display:block;margin:.75rem 0;font-size:1.25rem}</style></head><body><h1>Food Bowl</h1><a href="/cla/">CLA controller</a><a href="/cod/">COD controller</a></body></html>';
    }

    location = /cla {
        return 308 /cla/;
    }

    location /cla/ {
        try_files $uri $uri/ /cla/index.html;
    }

    location = /cod {
        return 308 /cod/;
    }

    location /cod/ {
        try_files $uri $uri/ /cod/index.html;
    }

    # PocketBase API on the Ubuntu host. The /pb/ prefix is stripped before
    # proxying because PocketBase is served at root on port 8090.
    location /pb/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # PocketBase realtime uses server-sent events: keep alive, no buffering.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # MQTT over WebSocket -> broker on the MQTT LXC. The /mqtt prefix is
    # stripped so the broker sees a root WebSocket connection.
    location /mqtt {
        proxy_pass http://192.168.0.49:9001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
